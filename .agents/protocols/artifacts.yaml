protocols:
  prd:
    artifact_type: prd
    format: markdown
    required_frontmatter_fields:
      - title
      - version
      - stage
      - created_by
    required_sections:
      - name: "Executive Summary"
        required: true
        match_strategy: exact
      - name: "Problem Statement"
        required: true
        match_strategy: exact
      - name: "Goals and Non-Goals"
        required: true
        match_strategy: exact
      - name: "User Stories"
        required: true
        match_strategy: exact
      - name: "Functional Requirements"
        required: true
        match_strategy: exact
      - name: "Non-Functional Requirements"
        required: true
        match_strategy: exact
      - name: "Success Metrics"
        required: true
        match_strategy: exact
      - name: "Timeline"
        required: true
        match_strategy: exact
      - name: "Risks and Mitigations"
        required: true
        match_strategy: exact
      - name: "Open Questions"
        required: true
        match_strategy: exact

  technical-specification:
    artifact_type: technical-specification
    format: markdown
    required_frontmatter_fields:
      - title
      - version
      - stage
      - status
      - authors
      - lineage
    required_sections:
      - name: "Architecture Overview"
        required: true
        match_strategy: exact
      - name: "System Topology"
        required: true
        match_strategy: exact
      - name: "Agent Catalog"
        required: true
        match_strategy: exact
      - name: "State Model"
        required: true
        match_strategy: exact
      - name: "Artifact Schemas"
        required: true
        match_strategy: exact
      - name: "Prompt Architecture"
        required: true
        match_strategy: exact
      - name: "System Prompts"
        required: true
        match_strategy: exact
      - name: "Prompt Composition Map"
        required: true
        match_strategy: exact
      - name: "Tool-Guidance Messages"
        required: true
        match_strategy: exact
      - name: "Tool Catalog"
        required: true
        match_strategy: exact
      - name: "Tool Descriptions and Contracts"
        required: true
        match_strategy: exact
      - name: "Tool Input/Output Schemas"
        required: true
        match_strategy: exact
      - name: "Tool Error Contracts"
        required: true
        match_strategy: exact
      - name: "Tool System Messages"
        required: true
        match_strategy: exact
      - name: "Middleware Stack"
        required: true
        match_strategy: exact
      - name: "Ordering and Rationale"
        required: true
        match_strategy: exact
      - name: "Interaction Model"
        required: true
        match_strategy: exact
      - name: "Human Review Flows"
        required: true
        match_strategy: exact
      - name: "API Contracts"
        required: true
        match_strategy: exact
      - name: "Frontend / UI Integration"
        required: true
        match_strategy: exact
      - name: "Environment Configuration"
        required: true
        match_strategy: exact
      - name: "Deployment Topology"
        required: true
        match_strategy: exact
      - name: "Testing Strategy"
        required: true
        match_strategy: exact
      - name: "Evaluation Strategy"
        required: true
        match_strategy: exact
      - name: "Error Handling"
        required: true
        match_strategy: exact
      - name: "Observability"
        required: true
        match_strategy: exact
      - name: "Safety and Guardrails"
        required: true
        match_strategy: exact
      - name: "Known Risks and Mitigations"
        required: true
        match_strategy: exact
      - name: "Architecture Decision Records"
        required: true
        match_strategy: exact
      - name: "PRD Traceability Matrix"
        required: true
        match_strategy: exact
      - name: "Specification Gaps"
        required: true
        match_strategy: exact

  eval-suite:
    artifact_type: eval-suite
    format: json
    required_frontmatter_fields: []
    required_sections:
      - name: metadata
        required: true
        match_strategy: exact
      - name: evals
        required: true
        match_strategy: exact
      - name: categories
        required: true
        match_strategy: exact
    required_nested_keys:
      metadata:
        - name: stage
          required: true
        - name: version
          required: true
        - name: created_by
          required: true
