commands:
  install: cd meta_harness && python3 -m venv .venv && .venv/bin/pip install -e ".[dev]"
  test: cd meta_harness && .venv/bin/python -m pytest tests/ -v --tb=short -x -j4
  test-contracts: cd meta_harness && .venv/bin/python -m pytest tests/contract/ -v --tb=short
  test-integration: cd meta_harness && .venv/bin/python -m pytest tests/integration/ -v --tb=short
  test-tui: cd meta_harness && .venv/bin/python -m pytest tests/tui/ -v --tb=short
  typecheck: cd meta_harness && .venv/bin/python -m pyright
  lint: cd meta_harness && .venv/bin/python -m ruff check .

services:
  langgraph-dev:
    start: cd meta_harness && PORT=3100 .venv/bin/python -m langgraph dev --port 3100
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100/ok
    port: 3100
    depends_on: []
