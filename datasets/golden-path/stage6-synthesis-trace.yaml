# GOLDEN-PATH Stage 6: Research Bundle Synthesis Trace
#
# This captures the main agent's tool calls during final synthesis.
# The agent reads all sub-findings, cross-references with skills knowledge,
# resolves contradictions, and writes the final research bundle.

synthesis_trace:

  # Step 1: Re-read decomposition file to verify all domains covered
  - name: read_file
    args: {file_path: "/workspace/projects/meta-agent/artifacts/research/research-decomposition.md"}
    timestamp: 36.0
    purpose: "Verify all 9 domains + 4 cross-cutting concerns have research coverage"

  # Step 2: Re-read PRD to ensure bundle maps to every requirement
  - name: read_file
    args: {file_path: "/workspace/projects/meta-agent/artifacts/intake/prd.md"}
    timestamp: 36.1
    purpose: "Cross-reference: does the research bundle address every functional requirement A-G?"

  # Step 3: Re-read eval suite to ensure bundle addresses eval implications
  - name: read_file
    args: {file_path: "/workspace/projects/meta-agent/evals/eval-suite-prd.yaml"}
    timestamp: 36.2
    purpose: "Verify research covers tooling/patterns needed for each eval to be implementable"

  # Step 4: Write the research bundle
  - name: write_file
    args: {file_path: "/workspace/projects/meta-agent/artifacts/research/research-bundle.md"}
    timestamp: 37.0
    purpose: "Write the final synthesized research bundle"

  # Step 5: Update decomposition file — mark all domains complete
  - name: edit_file
    args:
      file_path: "/workspace/projects/meta-agent/artifacts/research/research-decomposition.md"
      old_string: "| 1. Orchestration Architecture | 🔄"
      new_string: "| 1. Orchestration Architecture | ✅ Complete |"
    timestamp: 38.0
    purpose: "Update progress tracker — all domains now complete"

  # Step 6: Update agent memory with research summary
  - name: edit_file
    args:
      file_path: "/workspace/projects/meta-agent/.agents/research-agent/AGENTS.md"
      old_string: "# Research Agent Memory"
      new_string: |
        # Research Agent Memory

        ## Research Complete — Meta-Agent Project
        - Research bundle written to artifacts/research/research-bundle.md
        - 9 domains + 4 cross-cutting concerns fully researched
        - Primary recommendation: Deep Agents SDK on LangGraph
        - Confidence: HIGH across all domains
        - Skills consulted: 12, Sub-agents: 5, Web fetches: 78, SMEs: 6
        - 4 unresolved questions flagged for spec-writer
        - Key caveat: recursion limit must be explicitly configured
    timestamp: 38.1
    purpose: "Persist research summary to agent memory for future sessions"

# Final agent message to orchestrator
final_message: >
  Research phase complete. The research bundle has been written to
  /workspace/projects/meta-agent/artifacts/research/research-bundle.md.

  Key findings:
  - **Recommended architecture:** Deep Agents SDK (built on LangGraph) with
    supervisor pattern for multi-agent orchestration
  - **All 9 research domains covered** with HIGH confidence across 7 domains,
    MEDIUM-HIGH on 2
  - **13 sections** including ecosystem options, architecture details, rejected
    alternatives with rationale, SME perspectives, risks/caveats, and unresolved
    questions for the spec-writer
  - **78 web sources consulted**, 12 skills read, 6 SME handles checked,
    3 deep-dive verification clusters completed
  - **4 unresolved questions** flagged for spec-writer decision

  The research bundle is ready for the spec-writer. The spec-writer should
  evaluate whether the research is sufficient before beginning specification.
