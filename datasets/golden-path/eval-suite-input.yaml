# Tier 1 Eval Suite for Meta-Agent PRD
# This is the eval suite the research agent must read alongside the PRD.
# It defines what "done" means for the system being researched.

evals:

  # --- FR-A: PRD Generation and Refinement ---

  - id: EVAL-001
    name: "Conversational intake produces PRD artifact"
    requirement: FR-A
    category: acceptance
    input:
      scenario: >
        User describes a rough product idea in natural language.
        System collaborates through clarifying questions.
      preconditions:
        state: new_session
    expected:
      behavior: >
        System produces a durable PRD artifact at the canonical path.
        PRD contains goals, non-goals, constraints, acceptance criteria, and unresolved issues.
    scoring:
      strategy: binary
      threshold: 1.0

  - id: EVAL-002
    name: "PRD supports iterative revision"
    requirement: FR-A
    category: acceptance
    input:
      scenario: >
        User requests changes to an existing PRD artifact.
    expected:
      behavior: >
        System revises the PRD, preserves revision history, and re-presents for approval.
    scoring:
      strategy: binary
      threshold: 1.0

  # --- FR-B: Research Workflow ---

  - id: EVAL-003
    name: "Research phase produces grounded research bundle"
    requirement: FR-B
    category: acceptance
    input:
      scenario: >
        Given an approved PRD, the research agent runs.
    expected:
      behavior: >
        Research bundle artifact is produced, grounded in LangChain ecosystem skills
        and official documentation. Bundle captures constraints, options, and tradeoffs.
    scoring:
      strategy: binary
      threshold: 1.0

  - id: EVAL-004
    name: "Research uses skills as baseline domain guidance"
    requirement: FR-B
    category: acceptance
    input:
      scenario: >
        Skills directory contains LangChain, Anthropic, and LangSmith skills.
    expected:
      behavior: >
        Research agent reads and reflects on skill content before or during web research.
    scoring:
      strategy: binary
      threshold: 1.0

  - id: EVAL-005
    name: "Research extracts constraints and tradeoffs, not just summaries"
    requirement: FR-B
    category: quality
    input:
      scenario: >
        Research agent produces research bundle from PRD.
    expected:
      behavior: >
        Research bundle contains explicit constraints, architectural patterns, caveats,
        and tradeoff analyses — not merely summarized source material.
    scoring:
      strategy: likert
      threshold: 4.0
      anchors:
        1: "Bundle is pure summary of source material with no analysis"
        2: "Bundle mentions some constraints but lacks tradeoff analysis"
        3: "Bundle has constraints and some tradeoffs but misses caveats and patterns"
        4: "Bundle systematically extracts constraints, patterns, caveats, and tradeoffs"
        5: "Bundle provides rich analytical synthesis with cross-referenced tradeoffs"

  # --- FR-C: Technical Specification Generation ---

  - id: EVAL-006
    name: "Technical spec is exhaustive and implementation-ready"
    requirement: FR-C
    category: acceptance
    input:
      scenario: >
        Given approved PRD and research bundle, spec-writer produces technical spec.
    expected:
      behavior: >
        Technical specification covers all items in Technical-Spec Content Requirements
        section of the PRD with zero material ambiguity.
    scoring:
      strategy: likert
      threshold: 4.0
      anchors:
        1: "Spec is a stub or missing most required sections"
        2: "Spec covers some areas but leaves major ambiguity"
        3: "Spec covers most areas but some sections lack implementation detail"
        4: "Spec is comprehensive with minor gaps in edge cases"
        5: "Spec leaves zero ambiguity — every detail is implementation-ready"

  - id: EVAL-007
    name: "Spec documents architecture rationale and rejected alternatives"
    requirement: FR-C
    category: acceptance
    input:
      scenario: >
        Technical specification is produced.
    expected:
      behavior: >
        Spec includes explicit architecture rationale section with evidence-backed
        justification and documents rejected alternatives with tradeoff analysis.
    scoring:
      strategy: binary
      threshold: 1.0

  # --- FR-D: Planning ---

  - id: EVAL-008
    name: "Plan is sufficiently detailed to drive execution"
    requirement: FR-D
    category: acceptance
    input:
      scenario: >
        Given approved technical specification, plan-writer produces implementation plan.
    expected:
      behavior: >
        Plan includes implementation sequencing, validation steps, testing coverage,
        evaluation workflows, and completion criteria. No major decisions left unresolved.
    scoring:
      strategy: likert
      threshold: 4.0
      anchors:
        1: "Plan is a vague outline with no sequencing or criteria"
        2: "Plan has some structure but leaves major decisions unresolved"
        3: "Plan covers main phases but test/eval strategy is thin"
        4: "Plan is detailed with minor gaps in acceptance criteria"
        5: "Plan is fully executable — every phase has clear criteria and dependencies"

  # --- FR-E: Local Implementation ---

  - id: EVAL-009
    name: "System operates against local workspace files"
    requirement: FR-E
    category: acceptance
    input:
      scenario: >
        Code agent is given implementation tasks from the plan.
    expected:
      behavior: >
        Agent reads, writes, and edits files within the workspace.
        HITL gate fires before destructive changes.
    scoring:
      strategy: binary
      threshold: 1.0

  # --- FR-F: Evaluation and Audit ---

  - id: EVAL-010
    name: "System supports LangSmith-aligned evaluation workflows"
    requirement: FR-F
    category: acceptance
    input:
      scenario: >
        System is asked to create evaluation assets for a built agent.
    expected:
      behavior: >
        System creates datasets, evaluators, and execution workflows
        compatible with LangSmith. Inspects real traces before finalizing.
    scoring:
      strategy: binary
      threshold: 1.0

  # --- FR-G: Human-in-the-Loop ---

  - id: EVAL-011
    name: "Review checkpoints fire at all required gates"
    requirement: FR-G
    category: acceptance
    input:
      scenario: >
        Full workflow from intake through execution.
    expected:
      behavior: >
        HITL interrupts fire for artifact approval, prompt review,
        file writes, and command execution. Approval history is preserved.
    scoring:
      strategy: binary
      threshold: 1.0

  # --- Cross-Cutting: Artifact Continuity ---

  - id: EVAL-012
    name: "Artifact lineage is preserved across stages"
    requirement: Artifact Continuity
    category: acceptance
    input:
      scenario: >
        Artifacts are produced across INTAKE -> RESEARCH -> SPEC -> PLANNING stages.
    expected:
      behavior: >
        Each artifact's frontmatter includes lineage references to parent artifacts.
        Decision log, assumption log, and approval history are maintained.
    scoring:
      strategy: binary
      threshold: 1.0

  # --- Cross-Cutting: State of the Art Quality ---

  - id: EVAL-013
    name: "Architecture decisions are evidence-backed from research"
    requirement: Quality Requirements
    category: quality
    input:
      scenario: >
        Technical specification makes architecture choices.
    expected:
      behavior: >
        Every architecture decision cites research findings. No decisions are
        based on default assumptions or provider preference without evidence.
    scoring:
      strategy: likert
      threshold: 4.0
      anchors:
        1: "Architecture is assumed without any research citation"
        2: "Some decisions cite research but major choices are unjustified"
        3: "Most decisions have evidence but some rely on convention"
        4: "All major decisions cite specific research with minor gaps"
        5: "Every decision traces to specific research with full evidence chains"
