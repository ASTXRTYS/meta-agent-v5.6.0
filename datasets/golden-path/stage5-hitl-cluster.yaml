# GOLDEN-PATH Stage 5: HITL Research Cluster Presentation
#
# After sub-agents return findings and the main agent reviews them, the agent
# identifies areas that need deep-dive verification: source code review, open
# issues, PRs, and real-world usage patterns. Before spending tokens on this
# deep research, the agent presents a HITL cluster for user approval.
#
# This stage tests:
#   RB-011 (Binary): HITL gate fires before deep-dive research
#   RQ-012 (Likert): HITL research cluster quality
#
# Timeline context:
#   Stages 1-3 (PRD read, decomposition, skills): timestamps 1.0 - 24.0
#   Stage 4 (sub-agent delegation + collection): timestamps 25.0 - 31.0
#   Stage 5 (HITL cluster): timestamps 32.0 - 35.0

# ============================================================================
# HITL TRIGGER: Agent reasons about what needs deep verification
# ============================================================================

hitl_trigger_reasoning: >
  Sub-agent findings are collected. Before synthesizing the final research bundle,
  I need to verify critical claims and go deeper on areas where the sub-agents
  found promising but unverified information. Specifically:

  1. The foundation sub-agent found that Deep Agents SDK is the right foundation,
     but I should verify this by examining the actual source code and recent GitHub
     activity. Are there open issues that would affect our use case? Is the
     middleware system as extensible as the skills describe?

  2. The model sub-agent reported Opus 4.6 capabilities, but some pricing and
     rate limit information may be outdated. I should re-verify against the
     current Anthropic API docs.

  3. The SME sub-agent found relevant tweets, but I should verify the context
     of key quotes — tweets can be misleading without full thread context.

  4. The specialized sub-agent compared Daytona vs OpenSWE vs Deep Agents
     filesystem, but the comparison was surface-level. For a definitive
     recommendation to the spec-writer, I need to examine actual integration
     patterns and limitations.

  5. Several sub-agents referenced LangGraph patterns that I should verify
     against the actual LangGraph repository — the docs may lag behind the
     latest release.

  I'll group these into themed research clusters and present them for approval
  before proceeding.

# ============================================================================
# HITL PRESENTATION: Agent presents research clusters to user
# ============================================================================

hitl_presentation:
  tool_call:
    name: request_approval
    args:
      artifact_path: "/workspace/projects/meta-agent/artifacts/research/research-clusters.md"
      summary: >
        I've completed the initial research phase (skills + sub-agent web research).
        Before synthesizing the final research bundle, I want to do targeted deep-dive
        verification on 3 clusters. Here's what I want to investigate and why.
    timestamp: 32.0

  # The agent writes the cluster document BEFORE requesting approval
  cluster_document_write:
    tool_call:
      name: write_file
      args:
        file_path: "/workspace/projects/meta-agent/artifacts/research/research-clusters.md"
      timestamp: 31.5

  cluster_document_content: |
    ---
    artifact: research-clusters
    project_id: meta-agent
    title: "Deep-Dive Research Clusters — Approval Request"
    version: "1.0.0"
    status: pending_approval
    stage: RESEARCH
    authors:
      - research-agent
    lineage:
      - artifacts/research/research-decomposition.md
      - artifacts/research/sub-findings/foundation-research.md
      - artifacts/research/sub-findings/model-capabilities.md
      - artifacts/research/sub-findings/core-capabilities.md
      - artifacts/research/sub-findings/specialized-research.md
      - artifacts/research/sub-findings/sme-perspectives.md
    ---

    # Deep-Dive Research Clusters

    ## Context
    Initial research is complete: skills have been read (12 skills across 3 repos),
    and 5 sub-agents have completed parallel web research across all 9 domains
    plus SME perspectives. This document requests approval to conduct targeted
    deep-dive verification before synthesizing the final research bundle.

    ## Why Deep-Dive Is Needed
    Sub-agent findings established the broad landscape, but the spec-writer needs
    HIGH-CONFIDENCE findings for architectural decisions. Several claims need source
    verification, and some areas need deeper investigation of real-world patterns
    (issues, PRs, source code) to surface caveats the docs don't mention.

    ---

    ## Cluster 1: Deep Agents SDK Verification
    **Purpose:** Verify that the Deep Agents SDK is mature and extensible enough
    to serve as the foundation for the meta-agent architecture.

    **Why this matters:** This is the single most consequential architectural
    decision. If we recommend Deep Agents and it has critical limitations, the
    entire spec would need to be reworked. We need HIGH confidence.

    **Targets:**
    | # | Target | What I'll Investigate | Expected Insight |
    |---|--------|----------------------|------------------|
    | 1 | `langchain-ai/deep-agents` GitHub repo | Recent commit activity, open issues, contributor count | SDK maturity and maintenance health |
    | 2 | Open issues tagged `bug` or `limitation` | Known limitations that could affect multi-stage workflows | Risks the docs don't surface |
    | 3 | Recent PRs (last 3 months) | What's being actively developed/changed | SDK direction and stability |
    | 4 | `create_deep_agent()` source code | Exact middleware attachment, configuration options | Verify skills claims about auto-attached middleware |
    | 5 | `SubAgentMiddleware` source code | How sub-agent isolation works, shared state configuration options | Verify configurable isolation (not just default) |
    | 6 | `deepagents` PyPI release history | Version progression, breaking changes, release cadence | Production readiness signal |

    **PRD Relevance:**
    - Constraint (line 237): "built in the LangChain ecosystem" — Deep Agents must be verified as LangChain ecosystem
    - Stakeholder Intent (line 48): Sub-agent delegation — SubAgentMiddleware must support this
    - Quality Requirement (line 232): "state of the art" — SDK must be current best option

    **Estimated Effort:** 8-12 web fetches, ~15 minutes of focused investigation

    ---

    ## Cluster 2: LangGraph Production Patterns
    **Purpose:** Find real-world LangGraph multi-agent systems to validate our
    architectural approach against proven patterns.

    **Why this matters:** The sub-agents found documentation patterns, but
    documentation shows ideal usage. Real-world repos reveal actual challenges,
    workarounds, and patterns that emerge under production pressure. The spec-writer
    needs to know what works IN PRACTICE, not just in theory.

    **Targets:**
    | # | Target | What I'll Investigate | Expected Insight |
    |---|--------|----------------------|------------------|
    | 1 | `langchain-ai/langgraph` examples directory | Official example multi-agent implementations | Canonical patterns endorsed by LangChain |
    | 2 | GitHub search: LangGraph multi-agent repos with >50 stars | Community-built multi-agent systems | Real-world architectural patterns |
    | 3 | LangGraph GitHub discussions (recent) | Common pain points, questions about multi-agent patterns | Issues the community faces that docs don't address |
    | 4 | LangGraph changelog / release notes (last 6 months) | Breaking changes, new features for multi-agent | Stability assessment and feature trajectory |
    | 5 | `langchain-ai/langsmith-cookbook` eval examples | How LangChain themselves set up evaluation | Best-practice eval patterns from the source |

    **PRD Relevance:**
    - FR-B (line 149): Research must "extract constraints, patterns, caveats, and tradeoffs"
    - EVAL-013: Architecture decisions must be evidence-backed from research
    - Quality (line 234): "prefer evidence-backed decisions over convenience"

    **Estimated Effort:** 10-15 web fetches, ~20 minutes of investigation

    ---

    ## Cluster 3: Anthropic Agent Patterns Verification
    **Purpose:** Verify Opus 4.6 capabilities and Anthropic's agent-building
    guidance against current primary sources.

    **Why this matters:** Model capabilities directly inform tool design, prompt
    strategy, and context management. Sub-agent findings need verification because
    Anthropic updates their models and docs frequently — findings could be based on
    cached/outdated pages.

    **Targets:**
    | # | Target | What I'll Investigate | Expected Insight |
    |---|--------|----------------------|------------------|
    | 1 | Anthropic API docs — current model page | Verify Opus 4.6 context window, pricing, rate limits | Confirmed numbers for spec-writer |
    | 2 | Anthropic engineering blog — agent posts | Official guidance on building agents with Claude | Architecture patterns endorsed by Anthropic |
    | 3 | Anthropic tool-use documentation (current) | Native tools, tool_as_code, web search integration | Verified tool capabilities |
    | 4 | `langchain-ai/langchain-anthropic` recent releases | Breaking changes, new features, version compatibility | Integration stability |
    | 5 | @hwchase17 and @RLanceMartin threads on Anthropic + LangGraph | SME perspectives on Claude + LangGraph integration patterns | Practitioner insights on the specific integration we're building |

    **PRD Relevance:**
    - Research Requirements (line 225): "Official docs and API references as primary references"
    - EVAL-005: Research must extract constraints and tradeoffs, not just summaries
    - Domain 8 decomposition: Full capability matrix needed

    **Estimated Effort:** 8-10 web fetches, ~15 minutes of investigation

    ---

    ## Summary

    | Cluster | Targets | Est. Effort | Risk if Skipped |
    |---------|---------|-------------|-----------------|
    | 1. Deep Agents SDK | 6 targets | 8-12 fetches | HIGH — could recommend wrong foundation |
    | 2. LangGraph Production | 5 targets | 10-15 fetches | MEDIUM — spec may miss real-world caveats |
    | 3. Anthropic Verification | 5 targets | 8-10 fetches | MEDIUM — outdated capability assumptions |
    | **Total** | **16 targets** | **26-37 fetches** | — |

    **My recommendation:** All 3 clusters are important. Cluster 1 is critical —
    we should not finalize the research bundle without verifying the Deep Agents SDK.
    Clusters 2 and 3 add significant value but are lower risk if we must prioritize.

    **Requesting approval to proceed with all 3 clusters.**

# ============================================================================
# USER APPROVAL
# ============================================================================

user_approval:
  response: "approved"
  timestamp: 33.0

  # Agent confirms before proceeding
  agent_confirmation:
    message: >
      Confirmed — proceeding with all 3 research clusters. I'll investigate
      the 16 targets across Deep Agents SDK verification, LangGraph production
      patterns, and Anthropic agent patterns. Findings will be integrated into
      the sub-findings before final synthesis.
    timestamp: 33.1

# ============================================================================
# DEEP-DIVE EXECUTION (post-approval)
# ============================================================================

deep_dive_execution:

  # Cluster 1: Deep Agents SDK Verification
  cluster_1_tool_calls:
    - name: web_search
      args: {query: "langchain-ai deep-agents github repository"}
      timestamp: 34.0
    - name: web_fetch
      args: {url: "https://github.com/langchain-ai/deep-agents"}
      timestamp: 34.1
    - name: web_fetch
      args: {url: "https://github.com/langchain-ai/deep-agents/issues?q=is%3Aissue+is%3Aopen+label%3Abug"}
      timestamp: 34.2
    - name: web_fetch
      args: {url: "https://github.com/langchain-ai/deep-agents/pulls?q=is%3Apr+is%3Amerged+sort%3Aupdated-desc"}
      timestamp: 34.3
    - name: web_search
      args: {query: "deep-agents create_deep_agent source code middleware attachment"}
      timestamp: 34.4
    - name: web_fetch
      args: {url: "https://github.com/langchain-ai/deep-agents/blob/main/src/deepagents/agent.py"}
      timestamp: 34.5
    - name: web_fetch
      args: {url: "https://github.com/langchain-ai/deep-agents/blob/main/src/deepagents/middleware/subagent.py"}
      timestamp: 34.6
    - name: web_fetch
      args: {url: "https://pypi.org/project/deepagents/#history"}
      timestamp: 34.7

  # Cluster 2: LangGraph Production Patterns
  cluster_2_tool_calls:
