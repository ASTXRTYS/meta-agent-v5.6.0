  # ----------------------------------------------------------------
  # STEP 1: Initial findings review (per sub-agent)
  # ----------------------------------------------------------------
  main_agent_findings_review: >
    All 5 sub-agents have completed their research. Let me review each set
    of findings systematically:

    FOUNDATION (sub-agent-foundation):
    - Deep Agents SDK confirmed: deepagents>=0.4.3 on PyPI, active development
    - LangGraph multi-agent patterns documented: supervisor pattern is the best fit
      for our staged workflow with a central orchestrator
    - Checkpointer API: SqliteSaver for local dev, PostgresSaver for production
    - Store: InMemoryStore for dev, supports namespaced cross-thread memory
    - Compared alternatives: CrewAI lacks HITL, AutoGen lacks LangGraph integration,
      raw LangGraph requires more boilerplate than Deep Agents

    MODEL (sub-agent-model):
    - Opus 4.6: 200K context, state-of-the-art tool use and coding, extended thinking
    - Pricing: $15/MTok input, $75/MTok output (exact numbers from Anthropic docs)
    - Native tools: web search, code execution available via API
    - tool_as_code: Claude can write and execute tool implementations programmatically
    - langchain-anthropic>=1.3.0 provides ChatAnthropic with full tool binding
    - Prompt caching: up to 90% cost reduction on cached prefixes

    CORE (sub-agent-core):
    - HITL: interrupt() function within nodes for dynamic conditional gates
    - SummarizationMiddleware: auto-compacts when token usage exceeds threshold
    - Prompt caching: Anthropic cache breakpoints work with LangGraph system prompts
    - Tool patterns: @tool with detailed docstrings, StructuredTool for complex inputs
    - Dynamic prompts: construct prompt from stage-specific sections at runtime

    SPECIALIZED (sub-agent-specialized):
    - LangSmith evaluation: datasets + evaluators + experiments API fully documented
    - Daytona: sandboxed dev environments, Docker-based, API for programmatic control
    - OpenSWE: lightweight alternative, less mature than Daytona
    - Deep Agents filesystem: virtual_mode provides in-memory sandbox, path validation built-in
    - Safety: recursion_limit in graph.compile(), token budgets via middleware
    - Pydantic: TypedDict state is standard, Pydantic for tool input validation

    SME PERSPECTIVES (sub-agent-sme):
    - @hwchase17: Advocates for LangGraph as the foundation for complex agents;
      recent tweets about importance of state management and persistence
    - @RLanceMartin: Extensive content on eval-driven development, LangSmith workflows,
      emphasizes testing agent behavior not just outputs
    - @BraceSproul: Posts about tool design patterns, importance of clear tool descriptions
    - @masondrxy: Content on prompt engineering for agents, context window management
    - @sydneyrunkle: Pydantic v2 patterns for validation, structured outputs
    - @Vtrivedy10: Development workflow patterns, local-first iteration

  # ----------------------------------------------------------------
  # STEP 2: Gap & contradiction identification (RQ-013)
  # ----------------------------------------------------------------
  gap_contradiction_identification: >
    Now let me systematically cross-reference sub-agent findings to identify
    gaps and contradictions:

    CONTRADICTION 1: Persistence defaults
    - sub-agent-foundation says: "SqliteSaver for local dev"
    - sub-agent-core says: "MemorySaver is referenced as the dev default in
      SummarizationMiddleware docs"
    - SEVERITY: MEDIUM — affects which checkpointer we recommend for dev

    CONTRADICTION 2: Sub-agent return types
    - sub-agent-foundation says: "Sub-agents return findings as structured text"
    - Skills baseline says: "Sub-agent results can be typed/structured depending
      on interface and tools configured"
    - SEVERITY: LOW — the skills research was more nuanced, sub-agent simplified

    GAP 1: Prompt caching + dynamic prompts interaction
    - sub-agent-core found prompt caching and dynamic prompts separately
    - Neither addressed: if the system prompt changes per stage, does prompt
      caching still work? Or does each stage transition invalidate the cache?
    - SEVERITY: HIGH — directly affects cost and architecture of prompt system

    GAP 2: Deep Agents SDK version verification
    - sub-agent-foundation reports deepagents>=0.4.3 from docs
    - But the actual PyPI page may show a different latest version
    - SEVERITY: MEDIUM — need exact current version for spec

    GAP 3: LangGraph recursion limit default
    - sub-agent-specialized mentions recursion_limit in graph.compile()
    - But doesn't specify the DEFAULT value or whether it's sufficient for
      our multi-stage workflow with sub-agents
    - SEVERITY: HIGH — could cause silent failures if default is too low

  # ----------------------------------------------------------------
  # STEP 3: Root cause analysis
  # ----------------------------------------------------------------
  root_cause_analysis: >
    CONTRADICTION 1 ROOT CAUSE: Not a true contradiction. Both are correct
    in different contexts. MemorySaver is the FASTEST option for dev iteration
    (in-memory, no I/O). SqliteSaver is for dev sessions that need PERSISTENCE
    across server restarts. The sub-agents were researching different aspects
    of the same question. Resolution: both are valid, recommend MemorySaver
    as default with SqliteSaver as configurable option.

    CONTRADICTION 2 ROOT CAUSE: Sub-agent-foundation simplified the skills
    finding. The skills research was accurate — sub-agent returns are
    configurable. Resolution: use the nuanced skills finding in the final
    bundle. Don't overclaim that returns are "just text."

    GAP 1 ROOT CAUSE: Prompt caching interacts with dynamic prompts in a
    non-obvious way. Neither sub-agent was tasked with this specific
    intersection. This is a CROSS-CUTTING concern that only becomes visible
    when synthesizing across domains. Resolution: need targeted web research
    on Anthropic prompt caching invalidation behavior.

    GAP 2 ROOT CAUSE: Sub-agent reported from docs, which may lag behind
    actual PyPI releases. Resolution: direct PyPI page fetch needed.

    GAP 3 ROOT CAUSE: Sub-agent researched safety patterns broadly but didn't
    test the specific scenario of deep multi-stage workflows. Resolution:
    need to find the default recursion limit value and assess whether it's
    sufficient for our use case.

  # ----------------------------------------------------------------
  # STEP 4: Remediation plan
  # ----------------------------------------------------------------
  remediation_plan: >
    I need to resolve these before synthesis. Here's my targeted plan:

    REMEDIATION 1 (Contradiction 1 — persistence defaults):
    - ACTION: Already resolved through root cause analysis. No additional
      research needed. Will document both options with use cases in bundle.
    - EFFORT: None — resolved analytically.

    REMEDIATION 2 (Contradiction 2 — sub-agent returns):
    - ACTION: Already resolved. Will use the nuanced skills finding.
    - EFFORT: None — resolved by preferring the more accurate source.

    REMEDIATION 3 (Gap 1 — prompt caching + dynamic prompts):
    - ACTION: Fetch Anthropic prompt caching documentation specifically
      about cache invalidation. Search for patterns on how to structure
      system prompts so the stable prefix remains cached while stage-specific
      sections change.
    - EFFORT: 2-3 web fetches. Will include in HITL deep-dive cluster.

    REMEDIATION 4 (Gap 2 — SDK version):
    - ACTION: Fetch PyPI page for deepagents package directly.
    - EFFORT: 1 web fetch. Will include in HITL deep-dive cluster.

    REMEDIATION 5 (Gap 3 — recursion limit default):
    - ACTION: Find the default recursion limit in LangGraph docs or source
      code. Calculate whether our workflow depth (orchestrator → sub-agent →
      tool calls → potentially nested sub-agents) would exceed it.
    - EFFORT: 2-3 web fetches. Will include in HITL deep-dive cluster.

    All three remaining gaps will be addressed in the HITL deep-dive clusters
    (Stage 5). I'll incorporate these specific targets into the cluster document.

