# GOLDEN-PATH Stage 4: Sub-Agent Delegation Traces
#
# After completing skills research (Stage 3), the research agent now delegates
# web research to sub-agents. The agent follows the decomposition file's phasing:
#   Phase 1: Foundation (Domains 1, 2, 8) — must be done first
#   Phase 2: Core Capabilities (Domains 3, 4, 5) — parallel after Phase 1
#   Phase 3: Specialized (Domains 6, 7, 9) — parallel after Phase 2
#   Phase 4: Cross-cutting synthesis — main agent synthesizes
#
# The skills research already established baseline knowledge for Domains 1-4, 6, 8.
# Web research now needs to:
#   1. Verify and extend skill findings with official docs
#   2. Fill gaps the skills didn't cover (Domains 5, 7, 9)
#   3. Gather SME perspectives from Twitter handles
#   4. Find real-world usage patterns from repos, issues, PRs
#
# Architecture:
#   - Main research agent orchestrates and synthesizes
#   - Sub-agents execute parallel web research per domain cluster
#   - Sub-agents write findings to shared research output directory
#   - Main agent reads, validates, and synthesizes into research bundle

# ============================================================================
# PRE-DELEGATION: Main agent updates decomposition file and plans delegation
# ============================================================================

pre_delegation:

  # ----------------------------------------------------------------
  # STEP 1: Inventory remaining research gaps by domain
  # ----------------------------------------------------------------
  gap_inventory: >
    Skills research is complete. I've established baseline knowledge across
    Domains 1, 2, 3, 4, 6, and 8. Let me inventory the remaining gaps by
    estimated research volume:

    DOMAIN 1 (Orchestration) — HEAVY: 8 open questions, need SDK verification,
      alternative framework comparison, real-world production patterns, 2 SME
      perspectives (@hwchase17, @RLanceMartin). Estimated: 12-15 web fetches.

    DOMAIN 2 (State/Persistence) — MEDIUM: 4 open questions on exact APIs,
      checkpointer vs Store interaction, session persistence. Closely related
      to Domain 1 findings. Estimated: 6-8 web fetches.

    DOMAIN 8 (Model Capabilities) — HEAVY: Full capability matrix, pricing,
      rate limits, native tools, tool_as_code, extended thinking, Anthropic's
      agent-building guidance. Distinct from all other domains — requires deep
      dive into Anthropic docs specifically. Estimated: 10-12 web fetches.

    DOMAIN 5 (Prompts/Context) — MEDIUM: Prompt engineering patterns, context
      management, prompt caching. Some overlap with Domain 8 (Anthropic caching)
      and Domain 4 (tool descriptions). Estimated: 6-8 web fetches.

    DOMAIN 3 (HITL) — LIGHT: Skills covered most patterns. Need to verify
      advanced interrupt patterns, sub-agent HITL bubbling. Estimated: 3-4 web fetches.

    DOMAIN 4 (Tools) — MEDIUM: Opus 4.6 native tools, tool design best practices,
      @BraceSproul perspectives. Estimated: 5-7 web fetches.

    DOMAIN 6 (Evaluation) — MEDIUM: LangSmith experiments, programmatic eval API,
      online vs offline eval. Estimated: 6-8 web fetches.

    DOMAIN 7 (Workspace) — LIGHT: Daytona vs OpenSWE comparison, filesystem
      backend details. Estimated: 4-5 web fetches.

    DOMAIN 9 (Safety) — LIGHT: Recursion limits, token budgets, path validation,
      Pydantic patterns. Estimated: 4-5 web fetches.

    SME RESEARCH — CROSS-CUTTING: 6 Twitter handles across all domains.
      Each handle needs targeted search + profile review. Estimated: 12-14 web fetches.

    TOTAL ESTIMATED: ~70-80 web fetches across all domains.

  # ----------------------------------------------------------------
  # STEP 2: Reason about sub-agent topology
  # ----------------------------------------------------------------
  topology_reasoning: >
    Now I need to decide how many sub-agents to deploy and how to group the work.
    Let me think through this intentionally.

    OPTION A: One sub-agent per domain (9 sub-agents)
    - PRO: Maximum parallelism, each sub-agent has focused context
    - CON: Overkill — Domains 3, 7, 9 only need 3-5 fetches each. Spawning
      a sub-agent for 3 web fetches wastes the overhead of context setup.
      Also, 9 parallel sub-agents means 9 separate context windows to manage
      and 9 result sets to synthesize — synthesis complexity scales with sub-agent count.
    - VERDICT: Too many. Inefficient for lightweight domains.

    OPTION B: One sub-agent per decomposition phase (3 sub-agents)
    - Phase 1 sub-agent: Domains 1 + 2 + 8 (foundation)
    - Phase 2 sub-agent: Domains 3 + 4 + 5 (core)
    - Phase 3 sub-agent: Domains 6 + 7 + 9 (specialized)
    - PRO: Clean mapping to decomposition phasing, manageable synthesis
    - CON: Phase 1 sub-agent has ~30 web fetches across 3 very different
      domains (orchestration + persistence + model capabilities). That's too
      much cognitive load for one sub-agent — it might lose focus. Domain 8
      (Anthropic model) is completely distinct from Domains 1-2 (LangGraph).
    - VERDICT: Close, but Phase 1 sub-agent is overloaded and Domain 8
      should be separated.

    OPTION C: 4 sub-agents (split the heavy domains, combine the light ones)
    - Sub-agent 1: Domains 1 + 2 (architecture + state) — these are tightly
      coupled, same ecosystem (LangGraph/Deep Agents), ~18-23 fetches
    - Sub-agent 2: Domain 8 alone (Anthropic model capabilities) — completely
      distinct topic, own docs ecosystem, ~10-12 fetches
    - Sub-agent 3: Domains 3 + 4 + 5 (HITL + tools + prompts) — all core
      agent capabilities, natural overlap between them, ~14-19 fetches
    - Sub-agent 4: Domains 6 + 7 + 9 (eval + workspace + safety) — all
      supporting infrastructure, lighter weight, ~14-18 fetches
    - PRO: Balanced workload, logical groupings, no sub-agent overloaded
    - CON: SME research is scattered across all domains. Each sub-agent
      would need to also search Twitter, creating duplicate SME queries.
    - VERDICT: Good base, but SME research needs its own sub-agent.

    OPTION D: 5 sub-agents (Option C + dedicated SME researcher)
    - Sub-agents 1-4: Same as Option C
    - Sub-agent 5: Dedicated SME researcher for all 6 Twitter handles
    - PRO: Clean separation — technical research vs. SME perspectives.
      SME sub-agent can search all handles systematically without context
      pollution from technical docs. Technical sub-agents stay focused on
      docs and APIs.
    - CON: One additional sub-agent to synthesize results from.
    - VERDICT: This is the right balance.

    OPTION E: 6+ sub-agents (further splitting)
    - Could split Domain 1 from Domain 2, or Domain 6 from Domains 7+9.
    - But Domains 1+2 share the same ecosystem (LangGraph/Deep Agents) and
      findings in one directly inform the other. Splitting them would lose
      that cross-pollination within the sub-agent's context.
    - VERDICT: Diminishing returns. 5 is optimal.

    FINAL DECISION: 5 sub-agents.

  # ----------------------------------------------------------------
  # STEP 3: Articulate why each sub-agent exists
  # ----------------------------------------------------------------
  intentional_deployment: >
    Each sub-agent exists for a specific reason and contributes something
    no other sub-agent can provide:

    SUB-AGENT 1 — FOUNDATION RESEARCHER (Domains 1 + 2)
    WHY IT EXISTS: Domains 1 and 2 are the architectural bedrock. Every other
    domain's research builds on top of the orchestration and state decisions.
    These two domains share the same ecosystem (LangGraph, Deep Agents SDK)
    and findings in one directly constrain the other — e.g., the choice of
    supervisor pattern (Domain 1) determines how state flows between agents
    (Domain 2). Keeping them in one sub-agent preserves this cross-pollination.
    UNIQUE CONTRIBUTION: Validates the #1 architectural decision (Deep Agents
    SDK) against primary sources, alternatives, and real-world usage. Without
    this sub-agent's findings, the spec-writer has no verified foundation.
    ESTIMATED WORKLOAD: 18-23 web fetches (HEAVY — justified by criticality).

    SUB-AGENT 2 — MODEL RESEARCHER (Domain 8)
    WHY IT EXISTS: Anthropic model capabilities are a completely separate
    knowledge domain from LangGraph architecture. The docs, APIs, and pricing
    live on anthropic.com, not langchain.com. Mixing model research with
    architecture research would dilute both — the sub-agent needs focused
    context on Anthropic's docs, pricing pages, and engineering blog.
    UNIQUE CONTRIBUTION: Produces the definitive capability matrix (context
    window, pricing, rate limits, native tools, tool_as_code) that the
    spec-writer needs for cost modeling and tool design decisions.
    ESTIMATED WORKLOAD: 10-12 web fetches (MEDIUM — focused but deep).

    SUB-AGENT 3 — CORE CAPABILITIES RESEARCHER (Domains 3 + 4 + 5)
    WHY IT EXISTS: HITL, tools, and prompts are the three core agent
    capabilities that interact tightly. How tools work affects how HITL
    gates are designed. How prompts are composed affects how tools are
    described. Keeping all three in one sub-agent means findings in one
    area immediately inform the others — e.g., discovering that middleware
    can wrap tool calls (Domain 4) directly informs how HITL approval
    works (Domain 3).
    UNIQUE CONTRIBUTION: Produces the integrated picture of how the agent
    actually OPERATES — its tools, its prompts, and its human interaction
    patterns. Without this, the spec-writer has architecture but no behavior.
    ESTIMATED WORKLOAD: 14-19 web fetches (MEDIUM-HEAVY — three domains
    but with significant overlap).

    SUB-AGENT 4 — SPECIALIZED RESEARCHER (Domains 6 + 7 + 9)
    WHY IT EXISTS: Evaluation, workspace, and safety are supporting
    infrastructure that doesn't drive architecture but must be specified.
    These are lighter-weight domains individually (3-8 fetches each) —
    combining them into one sub-agent is efficient without overloading.
    They also share a theme: "how do we make the agent reliable and
    testable?"
    UNIQUE CONTRIBUTION: Produces the quality and safety layer — eval
    workflows, sandboxing options, guardrail patterns. Without this, the
    spec has architecture and behavior but no quality assurance.
    ESTIMATED WORKLOAD: 14-18 web fetches (MEDIUM — three light domains).

    SUB-AGENT 5 — SME RESEARCHER (Cross-cutting)
    WHY IT EXISTS: SME research is fundamentally different from docs/API
    research. It requires searching Twitter profiles, reading tweet threads,
    assessing relevance to research domains, and capturing perspectives that
    may not exist in official docs. Mixing SME research into technical
    sub-agents would (a) dilute the technical sub-agent's focus, (b) create
    duplicate Twitter searches across multiple sub-agents, and (c) lose the
    ability to systematically cover all 6 handles. A dedicated SME sub-agent
    can methodically work through each handle and map findings to domains.
    UNIQUE CONTRIBUTION: Produces the practitioner perspective layer — what
    do the people who BUILD these tools actually recommend? This adds
    confidence to or challenges the technical findings from docs.
    ESTIMATED WORKLOAD: 12-14 web fetches (MEDIUM — 6 handles × 2-3 searches each).

  tool_calls:
    # Update decomposition file with delegation plan
    - name: edit_file
      args:
        file_path: "/workspace/projects/meta-agent/artifacts/research/research-decomposition.md"
        old_string: "| 1. Orchestration Architecture | ⬜ Not started | — | — |"
        new_string: "| 1. Orchestration Architecture | 🔄 Skills complete, web research delegated | sub-agent-foundation | Deep Agents SDK confirmed as foundation |"
      timestamp: 25.0
    # Similar updates for all domains...
    - name: edit_file
      args:
        file_path: "/workspace/projects/meta-agent/artifacts/research/research-decomposition.md"
        old_string: "| 2. State & Persistence | ⬜ Not started | — | — |"
        new_string: "| 2. State & Persistence | 🔄 Skills complete, web research delegated | sub-agent-foundation | Checkpointer + Store + Filesystem confirmed |"
      timestamp: 25.1

# ============================================================================
# DELEGATION: 5 sub-agents launched in parallel
# ============================================================================

subagent_delegations:

  # --- Sub-agent 1: Foundation Researcher (Domains 1 + 2) ---
  - subagent_id: "sub-agent-foundation"
    domains: ["Domain 1: Orchestration Architecture", "Domain 2: State & Persistence"]
    launched_at: 26.0
    parallel_with: ["sub-agent-model", "sub-agent-core", "sub-agent-specialized", "sub-agent-sme"]

    task_description: >
      You are a research sub-agent investigating LangGraph and Deep Agents SDK
      architecture for a meta-agent system. Your parent agent has already read
      the relevant skills and established this baseline knowledge:

      BASELINE (from skills):
      - Deep Agents SDK provides create_deep_agent() factory built on LangGraph
      - Auto-attached middleware: TodoList, Filesystem, SubAgent, Summarization, caching
      - Custom middleware via AgentMiddleware base (4 hook types)
      - Checkpointer for per-thread state, Store for cross-thread memory
      - FilesystemMiddleware for workspace file operations
      - Sub-agents isolated by default but configurable for shared state/persistence

      YOUR RESEARCH TASKS:
      1. Verify Deep Agents SDK maturity: Find the deepagents PyPI package, check
         version history, download stats, GitHub activity. Is it production-ready?
      2. Compare alternatives: How does Deep Agents compare to CrewAI, AutoGen,
         and raw LangGraph for multi-stage agent systems? Specific tradeoffs.
      3. LangGraph StateGraph patterns: Find the official LangGraph docs on
         multi-agent architectures (supervisor, swarm, hierarchical). Which pattern
         best fits a staged workflow with 8+ stages?
      4. Persistence depth: Find exact SqliteSaver and PostgresSaver APIs. How do
         checkpointer and Store interact? Can state survive server restarts?
      5. Real-world examples: Find LangGraph-based multi-agent systems in production
         or open-source repos. How do they handle state across stages?

      PRD CONTEXT: This research supports a local-first meta-agent for agent
      engineering. Key PRD requirements: multi-stage workflow (INTAKE → RESEARCH →
      SPEC → PLAN → EXECUTION), sub-agent delegation, artifact-driven communication,
      HITL checkpoints, and LangChain ecosystem constraint.

      OUTPUT: Write your findings to /workspace/projects/meta-agent/artifacts/research/
      sub-findings/foundation-research.md with clear sections, citations (URLs), and
      tradeoff analysis. Distinguish between confirmed facts (from docs) and inferences.

