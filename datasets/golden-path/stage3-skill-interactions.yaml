    reflection: >
      LangGraph fundamentals covers the core graph primitives:
      
      - StateGraph: takes a state schema (TypedDict or Pydantic), defines nodes and edges
      - Nodes: functions that take state and return state updates
      - Edges: conditional routing between nodes based on state
      - State reducers: control how parallel updates merge (add, replace, custom)
      - Compilation: graph.compile() produces a runnable CompiledStateGraph
      - Message-based vs. custom state: MessagesState for chat, custom TypedDict for complex
      
      For the meta-agent: custom TypedDict state is needed because we track more than 
      just messages — we need current_stage, project_dir, artifacts, decision_log, etc.
      This confirms the approach seen in the existing codebase (MetaAgentState).
    internalization: >
