        timestamp: 15.2
    reflection: >
      The HITL skill provides the complete interrupt pattern:
      
      - **interrupt_before**: Pauses BEFORE a node executes — user sees proposed action
      - **interrupt_after**: Pauses AFTER a node — user reviews output before continuing
      - **Dynamic breakpoints**: interrupt() function called within node logic for conditional HITL
      - **Command**: Used to resume with modifications — Command(resume=value) or Command(update=state_patch)
      - Resume patterns: approve-as-is, modify-and-continue, reject-and-redirect
      - LangGraph Studio renders interrupts as interactive approval dialogs
      
      For the PRD's configurable participation (line 42): dynamic breakpoints are the 
      right pattern. The agent can check a participation_mode flag in state and only 
      call interrupt() when the toggle is on. When off, it proceeds autonomously.
      
      For artifact approval (FR-G): interrupt_before on write_file tool calls. The 
      Deep Agents SDK's interrupt_on config maps tool names to booleans — this is 
      exactly the pattern needed.
    internalization: >
      BASELINE KNOWLEDGE UPDATED:
      - Three interrupt patterns: interrupt_before, interrupt_after, dynamic interrupt()
      - Configurable HITL = dynamic breakpoints with state flag check
      - Artifact approval = interrupt_on for write_file tool
      - Command(resume=) for approve, Command(update=) for modify
      - Studio renders HITL as interactive dialogs — good UX
      
