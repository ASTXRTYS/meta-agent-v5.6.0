      The recommended pattern for the research agent:
      1. Write detailed research briefs for each sub-agent (task descriptions)
      2. Configure sub-agents with access to a shared research output directory
      3. Sub-agents write structured findings to files in that directory
      4. Parent agent reads all findings and synthesizes into research bundle
      This gives isolation (focused context) with collaboration (shared persistence).
