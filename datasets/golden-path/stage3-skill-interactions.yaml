    reflection: >
      Dataset skill: Create eval datasets from traces or synthetic examples. 
      Datasets have examples with inputs, expected outputs, and metadata.
      Can be created programmatically or from LangSmith UI.
      
      Evaluator skill: Three evaluator types:
      1. LLM-as-judge: uses another LLM to score outputs (good for qualitative evals)
      2. Heuristic: Python functions that check specific conditions (good for binary evals)
      3. Custom: arbitrary Python with access to run data, inputs, outputs, reference
      
      Experiments: run a dataset through an agent and score with evaluators.
      Results tracked in LangSmith with comparison across experiments.
      
      This maps perfectly to the meta-agent's eval tiers:
      - Tier 1 (PRD-derived): Binary heuristic evaluators + Likert LLM-as-judge
      - Tier 2 (Architecture-derived): More detailed evaluators from spec
      - Synthetic datasets: YAML-defined scenarios loaded into LangSmith
    internalization: >
