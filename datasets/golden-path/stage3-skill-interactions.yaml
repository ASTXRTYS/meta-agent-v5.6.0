      eval workflow the PRD requires.
    skill: "langsmith-dataset + langsmith-evaluator"
    tool_calls:
      - name: read_file
        args: {file_path: "/skills/langsmith/skills/langsmith-dataset/SKILL.md"}
        timestamp: 20.0
