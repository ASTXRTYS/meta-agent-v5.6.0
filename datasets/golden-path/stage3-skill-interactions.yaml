    reflection: >
      The deep-agents-orchestration skill details the sub-agent system:
      
      - SubAgentMiddleware auto-attaches the 'task' tool to the parent agent
      - The 'task' tool accepts: description (detailed brief), subagent_type (agent selector)
      - Sub-agents are isolated by DEFAULT — context isolation is the normal pattern, 
        giving each sub-agent its own context window for focused work
      - However, sub-agents CAN be configured with shared state, persistent backends, 
        or custom middleware if explicitly set up — isolation is not an absolute limitation
      - Sub-agents can share data through persistent filesystem paths routed to a 
        StoreBackend, enabling cross-agent communication via files
      - Sub-agent results are returned to the parent — the shape (text message vs 
        structured object) depends on the sub-agent interface and tools configured; 
        typed/structured outputs are possible when needed
      - Multiple sub-agents can be launched in parallel via multiple tool_use blocks
      - TodoListMiddleware provides write_todos for task planning and progress tracking
      - HITL: interrupt_on config maps tool names to boolean — granular control
      
      This is exactly what the PRD needs. The pattern maps directly:
      - Orchestrator (PM agent) → spawns research-agent, spec-writer, etc.
      - Research agent → spawns sub-agents for parallel research across domains
      - Code agent → spawns sub-agents for parallel implementation tasks
      
      Key architectural pattern: By default, sub-agents are isolated and the parent 
      provides context through detailed task descriptions. This is the recommended 
      pattern because it keeps sub-agent contexts focused. However, if we need 
      sub-agents to share findings (e.g., research sub-agents writing to a shared 
      research directory), we can configure persistent filesystem paths that all 
      sub-agents can access. This gives us the best of both worlds — isolation 
      for focused work, shared persistence for collaboration.
      
      This aligns with artifact-driven communication (PRD line 34) — sub-agents 
      write findings to files on the persistent filesystem, parent reads and synthesizes.
    internalization: >
