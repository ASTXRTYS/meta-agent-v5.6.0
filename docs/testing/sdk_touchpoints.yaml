version: 1

touchpoints:
  - id: sdk.deepagents.create_deep_agent
    module: deepagents
    symbol: create_deep_agent
    local_usages:
      - meta_agent/graph.py
    criticality: critical
    contract: "Graph assembly must expose expected tools, stream channels, subagents, backend, and HITL wiring."
    failure_mode: "App compiles but runtime composition drifts from Deep Agents conventions."
    required_coverage: [contract, integration]
    owner: graph-contracts

  - id: sdk.deepagents.CompositeBackend
    module: deepagents.backends
    symbol: CompositeBackend
    local_usages:
      - meta_agent/backend.py
    criticality: critical
    contract: "Routes file operations by path prefix to appropriate backend (default, /memories/, /large_tool_results/, /conversation_history/)."
    failure_mode: "File operations silently go to wrong backend, corrupting state or losing data."
    required_coverage: [contract, integration]
    owner: backend-middleware

  - id: sdk.deepagents.FilesystemBackend
    module: deepagents.backends
    symbol: FilesystemBackend
    local_usages:
      - meta_agent/backend.py
    criticality: critical
    contract: "Default backend with root_dir and virtual_mode=True for sandboxed disk access."
    failure_mode: "Filesystem operations escape sandbox or fail to write to expected locations."
    required_coverage: [contract, integration]
    owner: backend-middleware

  - id: sdk.deepagents.StateBackend
    module: deepagents.backends
    symbol: StateBackend
    local_usages:
      - meta_agent/backend.py
    criticality: critical
    contract: "Thread-scoped ephemeral storage for large_tool_results and conversation_history routes."
    failure_mode: "Ephemeral data persists across threads or is lost within a thread."
    required_coverage: [contract, integration]
    owner: backend-middleware

  - id: sdk.deepagents.StoreBackend
    module: deepagents.backends
    symbol: StoreBackend
    local_usages:
      - meta_agent/backend.py
    criticality: critical
    contract: "Cross-session persistent storage via LangGraph Store for /memories/ route."
    failure_mode: "Agent memories lost between sessions or leak across agents."
    required_coverage: [contract, integration]
    owner: backend-middleware

  - id: sdk.deepagents.MemoryMiddleware
    module: deepagents.middleware.memory
    symbol: MemoryMiddleware
    local_usages:
      - meta_agent/graph.py
    criticality: critical
    contract: "Loads per-agent AGENTS.md files with per-agent isolation via bare FilesystemBackend."
    failure_mode: "Agent memory not loaded or cross-agent memory leaks occur."
    required_coverage: [contract, integration]
    owner: middleware

  - id: sdk.deepagents.SkillsMiddleware
    module: deepagents.middleware.skills
    symbol: SkillsMiddleware
    local_usages:
      - meta_agent/graph.py
    criticality: critical
    contract: "On-demand SKILL.md loading from 3 skills directories (langchain, langsmith, anthropic)."
    failure_mode: "Skills not available to agent or wrong SKILL.md loaded."
    required_coverage: [contract, integration]
    owner: middleware

  - id: sdk.deepagents.SummarizationToolMW
    module: deepagents.middleware.summarization
    symbol: create_summarization_tool_middleware
    local_usages:
      - meta_agent/graph.py
    criticality: important
    contract: "Exposes compact_conversation tool for agent-controlled context compaction."
    failure_mode: "Context window overflows without agent-controlled compaction option."
    required_coverage: [contract]
    owner: middleware

  - id: sdk.deepagents.SubAgent
    module: deepagents.middleware.subagents
    symbol: SubAgent,CompiledSubAgent
    local_usages:
      - meta_agent/subagents/configs.py
    criticality: critical
    contract: "SDK SubAgent/CompiledSubAgent types for subagent definitions passed to create_deep_agent(subagents=...)."
    failure_mode: "Subagent delegation fails or subagents not properly registered."
    required_coverage: [contract, integration]
    owner: subagents-state

  - id: sdk.deepagents.AgentMiddleware
    module: langchain.agents.middleware.types
    symbol: AgentMiddleware
    local_usages:
      - meta_agent/middleware/dynamic_system_prompt.py
      - meta_agent/middleware/meta_state.py
      - meta_agent/middleware/tool_error_handler.py
      - meta_agent/middleware/completion_guard.py
      - meta_agent/middleware/agent_decision_state.py
    criticality: critical
    contract: "Base class for all custom middleware providing wrap_model_call, before_model, wrap_tool_call hooks."
    failure_mode: "Custom middleware silently ignored or hooks not called in correct order."
    required_coverage: [contract, integration]
    owner: middleware

  - id: sdk.langgraph.Command
    module: langgraph.types
    symbol: Command
    local_usages:
      - meta_agent/tools/__init__.py
    criticality: critical
    contract: "State-mutating tools return Command(update={...}) to update custom state fields."
    failure_mode: "State mutations silently dropped, graph state becomes stale."
    required_coverage: [contract, integration]
    owner: tools-hitl

  - id: sdk.langgraph.interrupt
    module: langgraph.types
    symbol: interrupt
    local_usages:
      - meta_agent/tools/__init__.py
    criticality: critical
    contract: "HITL checkpoint mechanism for gated tools (execute_command, request_approval, etc.)."
    failure_mode: "Dangerous operations execute without human approval."
    required_coverage: [contract, integration]
    owner: tools-hitl

  - id: sdk.langgraph.InjectedState
    module: langgraph.prebuilt
    symbol: InjectedState
    local_usages:
      - meta_agent/tools/__init__.py
    criticality: critical
    contract: "Injects current graph state into tool function parameters for state-aware tools."
    failure_mode: "Tools cannot read current state, stage-aware logic breaks."
    required_coverage: [contract, integration]

  - id: sdk.langgraph.MemorySaver
    module: langgraph.checkpoint.memory
    symbol: MemorySaver
    local_usages:
      - meta_agent/backend.py
      - meta_agent/graph.py
    criticality: important
    contract: "Development checkpointer for graph state persistence (swap to PostgresSaver in production)."
    failure_mode: "Graph state not persisted, conversation continuity lost on restart."
    required_coverage: [contract]
    owner: backend-middleware

  - id: sdk.langgraph.InMemoryStore
    module: langgraph.store.memory
    symbol: InMemoryStore
    local_usages:
      - meta_agent/backend.py
      - meta_agent/graph.py
    criticality: important
    contract: "Development store for agent memory (cross-session via StoreBackend)."
    failure_mode: "Agent memory not available, StoreBackend reads fail."
    required_coverage: [contract]
    owner: backend-middleware

  - id: sdk.langchain.tool_decorator
    module: langchain_core.tools
    symbol: tool
    local_usages:
      - meta_agent/tools/__init__.py
    criticality: critical
    contract: "Decorates functions as LangChain tool instances for create_deep_agent(tools=[...])."
    failure_mode: "Tools not recognized by SDK, agent cannot call custom tools."
    required_coverage: [contract, integration]
    owner: tools-hitl
