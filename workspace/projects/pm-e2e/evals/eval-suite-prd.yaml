evals:

  # ── FR-1: Init ──────────────────────────────────────────────────────

  - id: EVAL-001
    name: "Init creates config and updates gitignore"
    requirement: FR-1
    category: acceptance
    input:
      scenario: >
        In a fresh Git repo with no .envguard.yaml, run `envguard init`
        and provide a valid passphrase.
      preconditions:
        - Git repo exists (has .git directory)
        - No .envguard.yaml present
    expected:
      behavior: >
        .envguard.yaml is created with version: 1 and environments
        listing [development, staging, production]. .gitignore contains
        `.env`, `.env.*`, and `!.env.*.enc` patterns.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if .envguard.yaml exists with correct schema AND .gitignore
        contains all three required patterns. FAIL otherwise.

  - id: EVAL-002
    name: "Init rejects re-initialization without --force"
    requirement: FR-1
    category: acceptance
    input:
      scenario: >
        In a Git repo that already has .envguard.yaml, run `envguard init`
        without --force.
      preconditions:
        - .envguard.yaml already exists
    expected:
      behavior: >
        Command exits with non-zero code and prints error containing
        "already initialized".
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if exit code is non-zero AND stderr/output contains
        "already initialized". FAIL otherwise.

  - id: EVAL-003
    name: "Init fails outside a Git repo"
    requirement: FR-1
    category: acceptance
    input:
      scenario: >
        In a directory with no .git folder, run `envguard init`.
      preconditions:
        - No .git directory present
    expected:
      behavior: >
        Command exits with non-zero code and prints error containing
        "Not a Git repository".
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if exit code is non-zero AND output contains
        "Not a Git repository". FAIL otherwise.

  # ── FR-2: Push ──────────────────────────────────────────────────────

  - id: EVAL-004
    name: "Push encrypts .env file to .enc file"
    requirement: FR-2
    category: acceptance
    input:
      scenario: >
        With an initialized project and a .env.development file containing
        `DATABASE_URL=postgres://localhost/mydb`, run
        `envguard push development`.
      preconditions:
        - .envguard.yaml exists
        - .env.development exists with known content
    expected:
      behavior: >
        .env.development.enc is created. Its contents are NOT plaintext
        (do not contain "DATABASE_URL" as a readable string). Output
        contains confirmation message.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if .env.development.enc exists AND does not contain
        the plaintext string "DATABASE_URL" AND stdout contains
        confirmation. FAIL otherwise.

  - id: EVAL-005
    name: "Push fails when source .env file is missing"
    requirement: FR-2
    category: acceptance
    input:
      scenario: >
        With an initialized project but no .env.staging file, run
        `envguard push staging`.
      preconditions:
        - .envguard.yaml exists
        - .env.staging does NOT exist
    expected:
      behavior: >
        Command exits with non-zero code and prints error containing
        ".env.staging not found" or equivalent.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if exit code is non-zero AND output references the
        missing file. FAIL otherwise.

  # ── FR-3: Pull ──────────────────────────────────────────────────────

  - id: EVAL-006
    name: "Pull decrypts .enc file to plaintext .env"
    requirement: FR-3
    category: acceptance
    input:
      scenario: >
        With an initialized project and .env.development.enc (created via
        push), delete .env.development, then run
        `envguard pull development` with correct passphrase.
      preconditions:
        - .env.development.enc exists (valid ciphertext)
        - .env.development does NOT exist
    expected:
      behavior: >
        .env.development is created and its contents exactly match the
        original plaintext that was pushed.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if .env.development exists AND contents match original
        plaintext byte-for-byte. FAIL otherwise.

  - id: EVAL-007
    name: "Pull warns when local file differs from remote"
    requirement: FR-3
    category: acceptance
    input:
      scenario: >
        With .env.development containing different content than what is in
        .env.development.enc, run `envguard pull development`.
      preconditions:
        - .env.development exists with content A
        - .env.development.enc contains encrypted content B (B ≠ A)
    expected:
      behavior: >
        Output contains a warning about local file differing from remote.
        .env.development is overwritten with decrypted content B.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if output contains "differs" or "overwriting" warning AND
        .env.development now matches content B. FAIL otherwise.

  - id: EVAL-008
    name: "Pull fails with wrong passphrase"
    requirement: FR-3
    category: acceptance
    input:
      scenario: >
        With a valid .env.development.enc, run `envguard pull development`
        with an incorrect passphrase.
      preconditions:
        - .env.development.enc exists (encrypted with passphrase X)
        - User provides passphrase Y (Y ≠ X)
    expected:
      behavior: >
        Command exits with non-zero code and prints error about
        decryption failure. No .env.development file is created or
        modified.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if exit code is non-zero AND output contains "Decryption
        failed" or equivalent AND .env.development is unchanged. FAIL
        otherwise.

  # ── FR-4: Diff ──────────────────────────────────────────────────────

  - id: EVAL-009
    name: "Diff shows added/removed keys between local and remote"
    requirement: FR-4
    category: acceptance
    input:
      scenario: >
        Local .env.development has keys A, B, C. Remote .enc decrypts to
        keys A, B, D. Run `envguard diff development`.
      preconditions:
        - Local has KEY_A, KEY_B, KEY_C
        - Remote .enc decrypts to KEY_A, KEY_B, KEY_D
    expected:
      behavior: >
        Diff output shows KEY_C as removed (-) and KEY_D as added (+).
        KEY_A and KEY_B do not appear in diff (unchanged).
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if diff output shows KEY_C as removed and KEY_D as added.
        FAIL otherwise.

  - id: EVAL-010
    name: "Diff masks values by default"
    requirement: FR-4
    category: acceptance
    input:
      scenario: >
        Run `envguard diff development` without --show-values flag.
        Local and remote differ on KEY_SECRET value.
      preconditions:
        - Local and remote have different values for KEY_SECRET
    expected:
      behavior: >
        Diff output shows KEY_SECRET with masked values (e.g., ****)
        and does NOT show the actual secret values.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if diff output contains the key name and masked placeholder
        but NOT the actual secret value. FAIL otherwise.

  - id: EVAL-011
    name: "Diff --show-values reveals actual values"
    requirement: FR-4
    category: acceptance
    input:
      scenario: >
        Run `envguard diff development --show-values`. Local has
        KEY_SECRET=old_value, remote has KEY_SECRET=new_value.
      preconditions:
        - Differing values between local and remote
    expected:
      behavior: >
        Diff output shows actual values (old_value, new_value) instead
        of masked placeholders.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if diff output contains the actual values. FAIL if values
        are still masked.

  - id: EVAL-012
    name: "Diff reports no differences when files match"
    requirement: FR-4
    category: acceptance
    input:
      scenario: >
        Local .env.development matches decrypted .env.development.enc
        exactly. Run `envguard diff development`.
      preconditions:
        - Local and remote contents are identical
    expected:
      behavior: >
        Output contains "No differences found" or equivalent.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if output indicates no differences. FAIL if diff output
        is shown or an error occurs.

  # ── FR-5/FR-6: Config & Multi-Env ──────────────────────────────────

  - id: EVAL-013
    name: "Unknown environment is rejected"
    requirement: FR-5
    category: acceptance
    input:
      scenario: >
        Run `envguard push testing` where "testing" is not listed in
        .envguard.yaml environments.
      preconditions:
        - .envguard.yaml has environments: [development, staging, production]
    expected:
      behavior: >
        Command exits with non-zero code and prints error listing
        available environments.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if exit code is non-zero AND output lists available
        environments. FAIL otherwise.

  - id: EVAL-014
    name: "Push and pull work for each environment independently"
    requirement: FR-6
    category: acceptance
    input:
      scenario: >
        Push .env.development (content A) and .env.staging (content B),
        then delete both, then pull each.
      preconditions:
        - .env.development has content A
        - .env.staging has content B
    expected:
      behavior: >
        After pull, .env.development contains A and .env.staging contains B.
        Environments do not interfere with each other.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if both files are restored with correct, independent content.
        FAIL if either file has wrong content or the other env's content.

  # ── FR-7: Passphrase Handling ───────────────────────────────────────

  - id: EVAL-015
    name: "ENVGUARD_PASSPHRASE env var bypasses interactive prompt"
    requirement: FR-7
    category: acceptance
    input:
      scenario: >
        Set ENVGUARD_PASSPHRASE=mysecret and run `envguard push development`
        with no TTY / no interactive input.
      preconditions:
        - ENVGUARD_PASSPHRASE environment variable is set
        - .env.development exists
    expected:
      behavior: >
        Command completes successfully without prompting for input.
        .env.development.enc is created.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if command succeeds non-interactively and produces .enc file.
        FAIL if it hangs waiting for input or errors.

  - id: EVAL-016
    name: "Empty passphrase is rejected"
    requirement: FR-7
    category: acceptance
    input:
      scenario: >
        Set ENVGUARD_PASSPHRASE="" (empty string) and run
        `envguard push development`.
      preconditions:
        - ENVGUARD_PASSPHRASE is set to empty string
    expected:
      behavior: >
        Command exits with non-zero code and prints error about
        empty passphrase.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if exit code is non-zero AND output mentions empty
        passphrase. FAIL otherwise.

  # ── FR-8: Gitignore ────────────────────────────────────────────────

  - id: EVAL-017
    name: "Init is idempotent for gitignore patterns"
    requirement: FR-8
    category: acceptance
    input:
      scenario: >
        .gitignore already contains `.env.*`. Run `envguard init --force`.
      preconditions:
        - .gitignore exists with `.env.*` already present
    expected:
      behavior: >
        .gitignore is not duplicated — patterns appear only once.
        The `!.env.*.enc` exception is added if not already present.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if .gitignore has no duplicate patterns AND contains all
        three required patterns exactly once. FAIL otherwise.

  # ── NFR-1: Encryption Security ─────────────────────────────────────

  - id: EVAL-018
    name: "Encrypted file does not contain plaintext secrets"
    requirement: NFR-1
    category: security
    input:
      scenario: >
        Push a .env.development with known values (e.g.,
        SUPER_SECRET=my_very_secret_password_12345). Inspect the raw
        bytes of the .enc file.
      preconditions:
        - .env.development contains a known secret string
    expected:
      behavior: >
        The .enc file does NOT contain the plaintext string
        "my_very_secret_password_12345" anywhere in its bytes.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if grep/search for the plaintext secret in the .enc file
        returns no matches. FAIL if found.

  - id: EVAL-019
    name: "Round-trip encryption preserves file content exactly"
    requirement: NFR-1
    category: acceptance
    input:
      scenario: >
        Push .env.development, then pull it back. Compare the original
        and restored files.
      preconditions:
        - .env.development has multi-line content with special characters,
          empty lines, and comments
    expected:
      behavior: >
        Restored file is byte-for-byte identical to the original.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if SHA-256 hash of original matches hash of restored file.
        FAIL otherwise.

  # ── NFR-2: Performance ─────────────────────────────────────────────

  - id: EVAL-020
    name: "Push completes under 2 seconds for 100KB file"
    requirement: NFR-2
    category: performance
    input:
      scenario: >
        Create a .env.development file of ~100KB (many key-value pairs).
        Time `envguard push development`.
      preconditions:
        - .env.development is approximately 100KB
    expected:
      behavior: >
        Command completes in under 2 seconds wall-clock time.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: >
        PASS if wall-clock time < 2.0 seconds. FAIL otherwise.

  # ── Error Message Quality (cross-cutting) ──────────────────────────

  - id: EVAL-021
    name: "Error messages are clear and actionable"
    requirement: SC-4
    category: usability
    input:
      scenario: >
        Collect error messages from all error cases: init outside git repo,
        push missing file, pull wrong passphrase, diff missing file,
        unknown environment. Evaluate each for clarity and actionability.
      preconditions:
        - Trigger each documented error case
    expected:
      behavior: >
        Each error message explains what went wrong and suggests
        what the user should do next.
    scoring:
      strategy: likert
      threshold: 3.5
      rubric:
        "1": "Error is a raw exception, stack trace, or empty output — user has no idea what happened"
        "2": "Error exists but is cryptic or technical (e.g., 'ENOENT', 'Error code 0x80') — user must Google it"
        "3": "Error explains what went wrong but not how to fix it (e.g., 'File not found')"
        "4": "Error explains the problem and hints at a fix, with minor clarity issues (e.g., 'File not found. Did you run init?')"
        "5": "Error clearly states the problem, names the specific file/env, and tells the user exactly what to do next"
