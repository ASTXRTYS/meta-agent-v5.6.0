evals:

  # --- FR-1: Add Bookmark ---

  - id: EVAL-001
    name: "Add bookmark successfully"
    requirement: FR-1
    category: acceptance
    input:
      scenario: >
        Run: bookmarks add --url https://example.com --title "Example" --tags python,tutorial
        Then run: bookmarks list
      preconditions:
        database: empty
    expected:
      behavior: >
        Add command exits with code 0 and prints a confirmation message containing the title.
        Subsequent list command shows the bookmark with correct URL, title, and both tags (python, tutorial).
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if exit code is 0, confirmation printed, and bookmark appears in list with correct fields."

  - id: EVAL-002
    name: "Add duplicate URL is rejected"
    requirement: FR-1
    category: acceptance
    input:
      scenario: >
        Run: bookmarks add --url https://example.com --title "First" --tags a
        Run again: bookmarks add --url https://example.com --title "Second" --tags b
      preconditions:
        database: empty
    expected:
      behavior: >
        First add exits 0. Second add exits with non-zero code and prints an error message
        mentioning the duplicate. List shows only "First", not "Second".
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if second add exits non-zero, error message printed, and only first bookmark exists."

  - id: EVAL-003
    name: "Add bookmark with no tags"
    requirement: FR-1
    category: acceptance
    input:
      scenario: >
        Run: bookmarks add --url https://example.com --title "No Tags"
        (no --tags argument)
      preconditions:
        database: empty
    expected:
      behavior: >
        Command exits 0. Bookmark is added. List shows the bookmark with no tags.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if bookmark is added successfully without tags."

  # --- FR-2: Search ---

  - id: EVAL-004
    name: "Search by tag returns matching bookmarks"
    requirement: FR-2
    category: acceptance
    input:
      scenario: >
        Add three bookmarks:
          1. url=https://a.com title="Python Guide" tags=python,guide
          2. url=https://b.com title="Rust Guide" tags=rust,guide
          3. url=https://c.com title="Python Reference" tags=python,reference
        Run: bookmarks search --tag python
      preconditions:
        database: empty, then seeded with 3 bookmarks
    expected:
      behavior: >
        Returns exactly 2 bookmarks (a.com and c.com). Does not return b.com.
        Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if exactly the 2 python-tagged bookmarks are returned."

  - id: EVAL-005
    name: "Search by title substring is case-insensitive"
    requirement: FR-2
    category: acceptance
    input:
      scenario: >
        Add bookmark: url=https://a.com title="Python Guide" tags=python
        Run: bookmarks search --title "python"  (lowercase)
      preconditions:
        database: seeded with one bookmark
    expected:
      behavior: >
        Returns the bookmark "Python Guide" despite query being lowercase. Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if case-insensitive substring match works and the bookmark is returned."

  - id: EVAL-006
    name: "Search with no results"
    requirement: FR-2
    category: acceptance
    input:
      scenario: >
        Add bookmark: url=https://a.com title="Python Guide" tags=python
        Run: bookmarks search --tag nonexistent
      preconditions:
        database: seeded with one bookmark
    expected:
      behavior: >
        Prints "No bookmarks found." (or similar). Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if no-results message is printed and exit code is 0."

  # --- FR-3: List ---

  - id: EVAL-007
    name: "List all bookmarks"
    requirement: FR-3
    category: acceptance
    input:
      scenario: >
        Add 3 bookmarks with different URLs, titles, and tags.
        Run: bookmarks list
      preconditions:
        database: seeded with 3 bookmarks
    expected:
      behavior: >
        All 3 bookmarks are printed, each with ID, title, URL, and tags. Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if all 3 bookmarks appear with correct ID, title, URL, and tags."

  - id: EVAL-008
    name: "List on empty database"
    requirement: FR-3
    category: acceptance
    input:
      scenario: >
        Run: bookmarks list  (on fresh/empty database)
      preconditions:
        database: empty
    expected:
      behavior: >
        Prints "No bookmarks." (or similar). Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if empty-state message printed and exit code is 0."

  # --- FR-4: Delete ---

  - id: EVAL-009
    name: "Delete existing bookmark"
    requirement: FR-4
    category: acceptance
    input:
      scenario: >
        Add bookmark (ID will be 1). Run: bookmarks delete --id 1
        Then run: bookmarks list
      preconditions:
        database: seeded with 1 bookmark
    expected:
      behavior: >
        Delete exits 0, prints confirmation. Subsequent list does not show the deleted bookmark.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if delete exits 0, confirmation printed, and bookmark no longer in list."

  - id: EVAL-010
    name: "Delete nonexistent ID fails"
    requirement: FR-4
    category: acceptance
    input:
      scenario: >
        Run: bookmarks delete --id 999  (no bookmark with this ID)
      preconditions:
        database: empty or without ID 999
    expected:
      behavior: >
        Prints error message. Exits with non-zero code.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if exit code is non-zero and an error message is printed."

  # --- FR-5: Export ---

  - id: EVAL-011
    name: "Export produces valid HTML with all bookmarks"
    requirement: FR-5
    category: acceptance
    input:
      scenario: >
        Add 2 bookmarks:
          1. url=https://a.com title="Site A" tags=python
          2. url=https://b.com title="Site B" tags=rust,guide
        Run: bookmarks export --output /tmp/bookmarks.html
      preconditions:
        database: seeded with 2 bookmarks
    expected:
      behavior: >
        File /tmp/bookmarks.html is created. It contains:
        - A valid HTML5 doctype (<!DOCTYPE html>)
        - An <h1> heading
        - A <ul> with 2 <li> items
        - Each <li> has an <a href="..."> with the bookmark URL and title as link text
        - Tags are visible in the output
        Exit code 0, confirmation message with count "2".
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if HTML file exists, is valid HTML5 with correct structure, and contains all bookmarks."

  - id: EVAL-012
    name: "Export with empty database"
    requirement: FR-5
    category: acceptance
    input:
      scenario: >
        Run: bookmarks export --output /tmp/empty.html  (no bookmarks in DB)
      preconditions:
        database: empty
    expected:
      behavior: >
        HTML file is still generated (not an error). File is valid HTML5.
        Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if HTML file is created even with no bookmarks, and exit code is 0."

  # --- FR-6: Database Init ---

  - id: EVAL-013
    name: "Database auto-created on first run"
    requirement: FR-6
    category: acceptance
    input:
      scenario: >
        Delete any existing DB file. Run: bookmarks list --db /tmp/test_new.db
      preconditions:
        database: file does not exist
    expected:
      behavior: >
        Command completes without error. The file /tmp/test_new.db now exists.
        Exit code 0.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if DB file is created automatically and command succeeds."

  # --- FR-7: Error Handling ---

  - id: EVAL-014
    name: "Invalid command shows help"
    requirement: FR-7
    category: acceptance
    input:
      scenario: >
        Run: bookmarks notacommand
      preconditions: {}
    expected:
      behavior: >
        Prints usage/help information. Exits with code 2.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if usage help is printed and exit code is 2."

  - id: EVAL-015
    name: "Missing required args shows clear error"
    requirement: FR-7
    category: acceptance
    input:
      scenario: >
        Run: bookmarks add  (no --url or --title)
      preconditions: {}
    expected:
      behavior: >
        Prints error about missing arguments. Exits with non-zero code. No Python traceback.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if clear error printed, non-zero exit, no traceback."

  - id: EVAL-016
    name: "Error messages are user-friendly (no raw tracebacks)"
    requirement: FR-7
    category: acceptance
    input:
      scenario: >
        Trigger various error conditions: duplicate URL, nonexistent delete ID, missing args.
        Collect all stderr/stdout output.
      preconditions: {}
    expected:
      behavior: >
        No error output contains Python traceback lines (no "Traceback (most recent call last)",
        no "File \"...\", line ..."). All errors are plain English sentences.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if no raw Python tracebacks appear in any error output."

  # --- AC-11: No External Deps ---

  - id: EVAL-017
    name: "No external dependencies"
    requirement: AC-11
    category: constraint
    input:
      scenario: >
        Inspect all Python files in the project. Collect all import statements.
      preconditions: {}
    expected:
      behavior: >
        Every import is from the Python standard library. No third-party packages.
    scoring:
      strategy: binary
      threshold: 1.0
      rubric: "Pass if all imports are stdlib modules (argparse, sqlite3, os, sys, html, pathlib, etc.)."
